<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIMECHEL ELECTRIC PVT LTD</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #0a0a0c;
  --s1:      #111116;
  --s2:      #17171e;
  --s3:      #1e1e27;
  --b1:      #2a2a38;
  --b2:      #3c3c52;
  --pur:     #a855f7;
  --pur2:    #7c3aed;
  --txt:     #ede9ff;
  --mut:     #65657a;
  --mut2:    #42424f;
  --grn:     #34d399;
  --red:     #f87171;
  --ylw:     #fbbf24;
  --grn-bg:  rgba(52,211,153,.12);
  --red-bg:  rgba(248,113,113,.12);
  --ylw-bg:  rgba(251,191,36,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',sans-serif;min-height:100vh}
body::before{
  content:'';position:fixed;top:-20vh;left:50%;transform:translateX(-50%);
  width:70vw;height:50vh;
  background:radial-gradient(ellipse,rgba(124,58,237,.06) 0%,transparent 70%);
  pointer-events:none;z-index:0
}
.wrap{position:relative;z-index:1;max-width:1060px;margin:0 auto;padding:2rem 1.5rem 5rem}

/* HEADER */
header{display:flex;justify-content:space-between;align-items:center;
  padding-bottom:1.8rem;margin-bottom:2rem;border-bottom:1px solid var(--b1)}
.logo-sub{font-family:'JetBrains Mono',monospace;font-size:.58rem;
  color:var(--pur);letter-spacing:.3em;text-transform:uppercase;margin-bottom:.3rem;opacity:.8}
.logo-title{font-size:1.45rem;font-weight:800;letter-spacing:-.01em;line-height:1.1}
.logo-title span{background:linear-gradient(135deg,#a855f7,#7c3aed);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
.datechip{display:flex;align-items:center;gap:.5rem;background:var(--s2);
  border:1px solid var(--b1);border-radius:20px;padding:.4rem 1rem;
  font-family:'JetBrains Mono',monospace;font-size:.75rem}
.dot{width:7px;height:7px;border-radius:50%;background:var(--pur);
  box-shadow:0 0 7px var(--pur);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* TABS */
.tabs{display:flex;gap:.25rem;background:var(--s1);border:1px solid var(--b1);
  border-radius:13px;padding:.3rem;width:fit-content;margin-bottom:2rem}
.tab{padding:.48rem 1.3rem;border-radius:9px;border:none;background:transparent;
  color:var(--mut);font-family:'Outfit',sans-serif;font-size:.83rem;font-weight:500;
  cursor:pointer;transition:all .18s}
.tab.on{background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;
  box-shadow:0 4px 14px rgba(168,85,247,.3)}
.tab:hover:not(.on){color:var(--txt);background:var(--s2)}
.panel{display:none}.panel.on{display:block;animation:fu .22s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:.85rem;margin-bottom:1.8rem}
.sc{background:var(--s1);border:1px solid var(--b1);border-radius:13px;
  padding:1rem 1.1rem;position:relative;overflow:hidden;transition:border-color .2s}
.sc:hover{border-color:var(--b2)}
.sc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px}
.sc.tot::after{background:linear-gradient(90deg,var(--pur),transparent)}
.sc.prs::after{background:linear-gradient(90deg,var(--grn),transparent)}
.sc.abs::after{background:linear-gradient(90deg,var(--red),transparent)}
.sc.hlf::after{background:linear-gradient(90deg,var(--ylw),transparent)}
.sc.ot::after{background:linear-gradient(90deg,#f97316,transparent)}
.sc-ico{font-size:1.1rem;margin-bottom:.6rem;opacity:.6}
.sc-lbl{font-size:.6rem;font-weight:500;color:var(--mut);letter-spacing:.12em;
  text-transform:uppercase;margin-bottom:.25rem}
.sc-val{font-size:1.9rem;font-weight:800;line-height:1;letter-spacing:-.02em}
.sc.tot .sc-val{color:var(--txt)}
.sc.prs .sc-val{color:var(--grn)}
.sc.abs .sc-val{color:var(--red)}
.sc.hlf .sc-val{color:var(--ylw)}
.sc.ot  .sc-val{color:#f97316}

/* CONTROLS */
.ctrl{display:flex;gap:.75rem;margin-bottom:1.1rem;align-items:center;flex-wrap:wrap}
.dinput{background:var(--s1);border:1px solid var(--b1);border-radius:9px;
  padding:.55rem .9rem;color:var(--txt);font-family:'JetBrains Mono',monospace;
  font-size:.8rem;outline:none;cursor:pointer;transition:border-color .18s}
.dinput:focus{border-color:var(--pur)}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.45) sepia(1) hue-rotate(230deg)}

.btn{padding:.55rem 1.1rem;border-radius:9px;border:none;
  font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-p{background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;
  box-shadow:0 3px 12px rgba(168,85,247,.28)}
.btn-p:hover{box-shadow:0 5px 18px rgba(168,85,247,.42);transform:translateY(-1px)}
.btn-g{background:var(--s2);border:1px solid var(--b1);color:var(--txt)}
.btn-g:hover{border-color:var(--pur);color:var(--pur)}
.btn-d{background:transparent;border:1px solid rgba(248,113,113,.35);color:var(--red)}
.btn-d:hover{background:var(--red-bg)}
.btn-sm{padding:.28rem .7rem;font-size:.7rem;border-radius:7px}

/* MARK ALL */
.ma{display:flex;gap:.5rem;align-items:center;margin-bottom:1rem;
  padding:.65rem 1rem;background:var(--s1);border:1px solid var(--b1);
  border-radius:9px;flex-wrap:wrap}
.ma-lbl{font-size:.7rem;color:var(--mut);margin-right:auto;font-weight:500}
.ma-btn{padding:.26rem .75rem;border-radius:7px;
  font-family:'Outfit',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer;transition:all .15s}
.ma-P{background:var(--grn-bg);color:var(--grn);border:1px solid rgba(52,211,153,.28)}
.ma-A{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.28)}
.ma-H{background:var(--ylw-bg);color:var(--ylw);border:1px solid rgba(251,191,36,.28)}
.ma-P:hover{background:rgba(52,211,153,.22)}
.ma-A:hover{background:rgba(248,113,113,.22)}
.ma-H:hover{background:rgba(251,191,36,.22)}

/* ATTENDANCE TABLE */
.att-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:13px;overflow:hidden}
.att-head{display:grid;grid-template-columns:2.5rem 1fr 150px auto 90px;gap:1rem;
  padding:.65rem 1.2rem;background:var(--s2);border-bottom:1px solid var(--b1);
  font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--mut);
  letter-spacing:.18em;text-transform:uppercase}
.att-row{display:grid;grid-template-columns:2.5rem 1fr 150px auto 90px;gap:1rem;
  padding:.85rem 1.2rem;border-bottom:1px solid var(--b1);align-items:center;transition:background .12s}
.att-row:last-child{border-bottom:none}
.att-row:hover{background:var(--s2)}
.rnum{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--mut2)}
.ename{font-size:.92rem;font-weight:600;color:var(--txt)}
.esub{font-size:.7rem;color:var(--mut);margin-top:.12rem}
.erole{font-size:.75rem;color:var(--mut)}
.sgrp{display:flex;gap:.32rem}

/* OT INPUT */
.ot-wrap{display:flex;align-items:center;gap:.3rem}
.ot-inp{width:52px;background:var(--s2);border:1px solid var(--b1);border-radius:7px;
  padding:.3rem .4rem;color:var(--ylw);font-family:'JetBrains Mono',monospace;
  font-size:.75rem;font-weight:500;outline:none;text-align:center;transition:border-color .15s}
.ot-inp:focus{border-color:var(--ylw);box-shadow:0 0 0 2px rgba(251,191,36,.15)}
.ot-inp::placeholder{color:var(--mut2)}
.ot-lbl{font-size:.6rem;color:var(--mut);font-family:'JetBrains Mono',monospace}

/* STATUS BUTTONS — key fix: data-id & data-s attributes, no inline onclick strings */
.sbtn{width:40px;height:30px;border-radius:7px;border:1px solid var(--b1);
  background:transparent;font-family:'Outfit',sans-serif;font-size:.72rem;font-weight:600;
  cursor:pointer;transition:all .14s;color:var(--mut);display:flex;align-items:center;justify-content:center}
.sbtn:hover{border-color:var(--b2);color:var(--txt)}
.sbtn.P{background:var(--grn-bg);border-color:var(--grn);color:var(--grn);box-shadow:0 0 8px rgba(52,211,153,.18)}
.sbtn.A{background:var(--red-bg);border-color:var(--red);color:var(--red);box-shadow:0 0 8px rgba(248,113,113,.18)}
.sbtn.H{background:var(--ylw-bg);border-color:var(--ylw);color:var(--ylw);box-shadow:0 0 8px rgba(251,191,36,.18)}

/* EMPTY */
.empty{text-align:center;padding:3.5rem 2rem;color:var(--mut)}
.empty-ico{font-size:2.2rem;margin-bottom:.8rem;opacity:.45}
.empty p{font-size:.82rem;line-height:1.7}

/* ADD FORM */
.addform{background:var(--s1);border:1px solid var(--b1);border-radius:13px;
  padding:1.4rem;margin-bottom:1.8rem}
.form-title{font-size:.9rem;font-weight:700;color:var(--pur);margin-bottom:1.1rem}
.fgrid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:.75rem;align-items:end}
.ff{display:flex;flex-direction:column;gap:.35rem}
.flbl{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--mut);
  letter-spacing:.15em;text-transform:uppercase}
.finp{background:var(--s2);border:1px solid var(--b1);border-radius:8px;
  padding:.55rem .85rem;color:var(--txt);font-family:'Outfit',sans-serif;
  font-size:.85rem;outline:none;transition:border-color .18s}
.finp:focus{border-color:var(--pur);box-shadow:0 0 0 3px rgba(168,85,247,.1)}
.finp::placeholder{color:var(--mut2)}

/* EMP LIST */
.elisthd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem}
.elistttl{font-size:.95rem;font-weight:700}
.epill{background:var(--s2);border:1px solid var(--b1);border-radius:20px;
  padding:.18rem .75rem;font-size:.67rem;color:var(--mut);font-family:'JetBrains Mono',monospace}
.egrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:.85rem}
.ecard{background:var(--s1);border:1px solid var(--b1);border-radius:12px;
  padding:.95rem 1rem;display:flex;align-items:center;gap:.85rem;transition:all .18s}
.ecard:hover{border-color:rgba(168,85,247,.32);background:var(--s2)}
.av{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0}
.ename2{font-size:.88rem;font-weight:700}
.emeta{font-size:.68rem;color:var(--mut);margin-top:.1rem}

/* REPORTS */
.repctrls{display:flex;gap:.75rem;margin-bottom:1.6rem;flex-wrap:wrap;align-items:flex-end}
.repwrap{background:var(--s1);border:1px solid var(--b1);border-radius:13px;overflow-x:auto}
.reptbl{width:100%;border-collapse:collapse;font-size:.8rem}
.reptbl th{padding:.7rem 1rem;background:var(--s2);text-align:left;
  font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--mut);
  letter-spacing:.15em;text-transform:uppercase;border-bottom:1px solid var(--b1);white-space:nowrap}
.reptbl td{padding:.78rem 1rem;border-bottom:1px solid var(--b1);white-space:nowrap;vertical-align:middle}
.reptbl tr:last-child td{border-bottom:none}
.reptbl tbody tr:hover td{background:var(--s2)}
.badge{display:inline-flex;align-items:center;padding:.16rem .55rem;
  border-radius:20px;font-size:.66rem;font-weight:600}
.bP{background:var(--grn-bg);color:var(--grn);border:1px solid rgba(52,211,153,.22)}
.bA{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.22)}
.bH{background:var(--ylw-bg);color:var(--ylw);border:1px solid rgba(251,191,36,.22)}
.pbar{display:flex;align-items:center;gap:.55rem}
.ptrack{width:65px;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;flex-shrink:0}
.pfill{height:100%;border-radius:2px;transition:width .35s}
.ptext{font-weight:700;font-size:.78rem}

/* TOAST */
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--s2);
  border:1px solid var(--b2);border-left:3px solid var(--pur);border-radius:10px;
  padding:.7rem 1.1rem;font-size:.8rem;font-weight:500;color:var(--txt);z-index:9999;
  transform:translateY(70px);opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 8px 28px rgba(0,0,0,.5)}
.toast.show{transform:translateY(0);opacity:1}

/* SAVE INDICATOR */
.save-dot{display:inline-block;width:7px;height:7px;border-radius:50%;
  background:var(--ylw);margin-left:.4rem;vertical-align:middle;display:none}
.save-dot.on{display:inline-block;animation:blink 1s infinite}

@media(max-width:700px){
  .stats{grid-template-columns:repeat(3,1fr)}
  .fgrid{grid-template-columns:1fr 1fr}
  .att-head,.att-row{grid-template-columns:2rem 1fr auto 70px}
  .att-head .h-role,.att-row .erole{display:none}
  header{flex-direction:column;gap:.7rem;align-items:flex-start}
}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="logo-sub">▸ Attendance Management System</div>
      <div class="logo-title">CIMECHEL <span>ELECTRIC PVT LTD</span></div>
    </div>
    <div class="datechip"><span class="dot"></span><span id="hdr-date">—</span></div>
  </header>

  <div class="tabs">
    <button class="tab on"  onclick="goTab('att')">📋 Attendance</button>
    <button class="tab"     onclick="goTab('emp')">👥 Employees</button>
    <button class="tab"     onclick="goTab('rep')">📊 Reports</button>
  </div>

  <!-- ══ ATTENDANCE ══ -->
  <div id="tab-att" class="panel on">
    <div class="stats">
      <div class="sc tot"><div class="sc-ico">🏢</div><div class="sc-lbl">Total</div><div class="sc-val" id="s-tot">0</div></div>
      <div class="sc prs"><div class="sc-ico">✅</div><div class="sc-lbl">Present</div><div class="sc-val" id="s-prs">0</div></div>
      <div class="sc abs"><div class="sc-ico">❌</div><div class="sc-lbl">Absent</div><div class="sc-val" id="s-abs">0</div></div>
      <div class="sc hlf"><div class="sc-ico">🌓</div><div class="sc-lbl">Half Day</div><div class="sc-val" id="s-hlf">0</div></div>
      <div class="sc ot"><div class="sc-ico">⚡</div><div class="sc-lbl">Total OT hrs</div><div class="sc-val" id="s-ot">0</div></div>
    </div>

    <div class="ctrl">
      <input type="date" class="dinput" id="att-date">
      <button class="btn btn-p" id="savebtn" onclick="saveAtt()">
        💾 Save<span class="save-dot" id="sdot"></span>
      </button>
      <button class="btn btn-g" onclick="exportDay()">⬇ Export CSV</button>
    </div>

    <div class="ma">
      <span class="ma-lbl">Sab mark karo →</span>
      <button class="ma-btn ma-P" onclick="markAll('P')">✓ Present</button>
      <button class="ma-btn ma-A" onclick="markAll('A')">✗ Absent</button>
      <button class="ma-btn ma-H" onclick="markAll('H')">½ Half Day</button>
    </div>

    <div class="att-wrap">
      <div class="att-head">
        <span>#</span><span>Employee</span>
        <span class="h-role">Role</span><span>Status</span><span>OT (hrs)</span>
      </div>
      <div id="att-body"></div>
    </div>
  </div>

  <!-- ══ EMPLOYEES ══ -->
  <div id="tab-emp" class="panel">
    <div class="addform">
      <div class="form-title">✦ Add Employee</div>
      <div class="fgrid">
        <div class="ff"><label class="flbl">Full Name</label><input class="finp" id="i-name" placeholder="Rahul Sharma"></div>
        <div class="ff"><label class="flbl">Department</label><input class="finp" id="i-dept" placeholder="HR / Tech / Sales"></div>
        <div class="ff"><label class="flbl">Role</label><input class="finp" id="i-role" placeholder="Manager / Developer"></div>
        <button class="btn btn-p" style="height:39px;align-self:end" onclick="addEmp()">Add</button>
      </div>
    </div>
    <div class="elisthd">
      <span class="elistttl">All Employees</span>
      <span class="epill" id="ecnt">0 employees</span>
    </div>
    <div class="egrid" id="egrid"></div>
  </div>

  <!-- ══ REPORTS ══ -->
  <div id="tab-rep" class="panel">
    <div class="repctrls">
      <div class="ff"><label class="flbl">From</label><input type="date" class="dinput" id="r-from"></div>
      <div class="ff"><label class="flbl">To</label><input type="date" class="dinput" id="r-to"></div>
      <button class="btn btn-p" onclick="genReport()">Generate</button>
      <button class="btn btn-g" onclick="exportReport()">⬇ Export CSV</button>
    </div>
    <div class="repwrap">
      <table class="reptbl">
        <thead><tr>
          <th>Employee</th><th>Dept</th><th>Days</th>
          <th>Present</th><th>Absent</th><th>Half</th><th>Total OT hrs</th><th>%</th>
        </tr></thead>
        <tbody id="rep-body">
          <tr><td colspan="7" style="text-align:center;color:var(--mut);padding:2.5rem;font-size:.82rem">
            Date range select karo → Generate dabao
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
//  STATE  (plain objects, no frameworks)
// ════════════════════════════════════════════════
let emps = JSON.parse(localStorage.getItem('wt2_emps') || '[]');
let att  = JSON.parse(localStorage.getItem('wt2_att')  || '{}');

// att structure:  { "2025-03-18": { "empId1": "P", "empId2": "A", ... }, ... }

let curDate = '';   // currently viewed date string  "YYYY-MM-DD"
let dirty   = false; // unsaved changes flag

// ════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  const d = today();
  document.getElementById('hdr-date').textContent = fmt(d);
  document.getElementById('att-date').value = d;
  document.getElementById('att-date').addEventListener('change', onDatePick);

  const now = new Date();
  document.getElementById('r-from').value = now.getFullYear() + '-' + p2(now.getMonth()+1) + '-01';
  document.getElementById('r-to').value   = d;

  curDate = d;
  if (!att[curDate]) att[curDate] = {};

  renderEmps();
  renderRows();
});

// ════════════════════════════════════════════════
//  DATE CHANGE  — auto-save before leaving
// ════════════════════════════════════════════════
function onDatePick() {
  const newD = document.getElementById('att-date').value;
  if (!newD || newD === curDate) return;

  // Auto-save current date before switching
  autoSave();

  // Switch to new date
  curDate = newD;
  if (!att[curDate]) att[curDate] = {};  // init if first time
  dirty = false;
  setDirty(false);
  renderRows();
  showToast('📅 ' + fmt(curDate));
}

function autoSave() {
  if (dirty) {
    // att[curDate] is already up-to-date (we mutate it directly — see setStatus)
    save();
    showToast('✓ ' + fmt(curDate) + ' saved!');
    dirty = false;
    setDirty(false);
  }
}

// ════════════════════════════════════════════════
//  TABS
// ════════════════════════════════════════════════
function goTab(id) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('on', ['att','emp','rep'][i] === id);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.getElementById('tab-'+id).classList.add('on');
}

// ════════════════════════════════════════════════
//  EMPLOYEES
// ════════════════════════════════════════════════
const PAL = ['#a855f7','#34d399','#f87171','#fbbf24','#60a5fa','#f472b6','#a3e635'];
function aColor(n){ let h=0; for(let c of n) h=((h<<5)-h)+c.charCodeAt(0); return PAL[Math.abs(h)%PAL.length]; }
function avi(n){ return n.split(' ').map(w=>w[0]||'').slice(0,2).join('').toUpperCase(); }

function addEmp() {
  const name = document.getElementById('i-name').value.trim();
  const dept = document.getElementById('i-dept').value.trim() || 'General';
  const role = document.getElementById('i-role').value.trim() || 'Employee';
  if (!name) { showToast('⚠ Naam likhna zaroori hai!'); return; }
  emps.push({ id: String(Date.now()), name, dept, role });
  save();
  document.getElementById('i-name').value = '';
  document.getElementById('i-dept').value = '';
  document.getElementById('i-role').value = '';
  renderEmps();
  renderRows();
  showToast('✓ ' + name + ' added!');
}

function delEmp(id) {
  const e = emps.find(x => x.id === id);
  if (!confirm((e?.name || 'Employee') + ' ko remove karo?')) return;
  emps = emps.filter(x => x.id !== id);
  // Remove from all dates
  Object.keys(att).forEach(d => delete att[d][id]);
  save();
  renderEmps();
  renderRows();
  showToast('Employee removed');
}

function renderEmps() {
  document.getElementById('ecnt').textContent = emps.length + (emps.length === 1 ? ' employee' : ' employees');
  const g = document.getElementById('egrid');
  if (!emps.length) {
    g.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-ico">👥</div><p>Koi employee nahi.<br>Upar form se add karo!</p></div>';
    return;
  }
  g.innerHTML = emps.map(e => {
    const c = aColor(e.name);
    return `<div class="ecard">
      <div class="av" style="background:${c}1a;color:${c};border:1px solid ${c}33">${avi(e.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="ename2">${esc(e.name)}</div>
        <div class="emeta">${esc(e.role)} · ${esc(e.dept)}</div>
      </div>
      <button class="btn btn-sm btn-d" data-del="${e.id}">✕</button>
    </div>`;
  }).join('');

  // Attach delete listeners (no inline onclick — avoids escaping issues)
  g.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', () => delEmp(btn.dataset.del));
  });
}

// ════════════════════════════════════════════════
//  ATTENDANCE ROWS
//  — builds DOM once, then updates classes in-place
// ════════════════════════════════════════════════
function renderRows() {
  updateStats();
  const body = document.getElementById('att-body');

  if (!emps.length) {
    body.innerHTML = '<div class="empty"><div class="empty-ico">📋</div><p>Pehle Employees tab mein staff add karo!</p></div>';
    return;
  }

  body.innerHTML = emps.map((e, i) => `
    <div class="att-row" data-emp="${e.id}">
      <span class="rnum">${p2(i+1)}</span>
      <div>
        <div class="ename">${esc(e.name)}</div>
        <div class="esub">${esc(e.dept)}</div>
      </div>
      <span class="erole">${esc(e.role)}</span>
      <div class="sgrp">
        <button class="sbtn" data-id="${e.id}" data-s="P">P</button>
        <button class="sbtn" data-id="${e.id}" data-s="A">A</button>
        <button class="sbtn" data-id="${e.id}" data-s="H">½</button>
      </div>
      <div class="ot-wrap">
        <input class="ot-inp" type="number" min="0" max="24" step="0.5"
          data-ot="${e.id}"
          placeholder="0"
          value="${(att[curDate]?.ot?.[e.id]) || ''}">
        <span class="ot-lbl">hr</span>
      </div>
    </div>`).join('');

  syncStatusClasses();

  // Event delegation for status buttons
  body.addEventListener('click', onRowClick);

  // OT input listener — update on change
  body.addEventListener('change', onOTChange);
  body.addEventListener('input',  onOTChange);
}

function onRowClick(e) {
  const btn = e.target.closest('.sbtn');
  if (!btn) return;
  const id = btn.dataset.id;
  const s  = btn.dataset.s;
  setStatus(id, s);
}

// setStatus — directly mutates att[curDate], then refreshes classes + stats
function setStatus(id, s) {
  if (!att[curDate]) att[curDate] = {};
  const cur = att[curDate][id];
  if (cur === s) delete att[curDate][id];
  else att[curDate][id] = s;
  setDirty(true);
  syncStatusClasses();
  updateStats();
}

// Only update CSS classes — never re-renders innerHTML
function syncStatusClasses() {
  const day = att[curDate] || {};
  document.querySelectorAll('#att-body .sbtn').forEach(btn => {
    const active = day[btn.dataset.id] === btn.dataset.s;
    btn.className = 'sbtn' + (active ? ' ' + btn.dataset.s : '');
  });
  // Sync OT inputs (in case date changed)
  const otMap = day.ot || {};
  document.querySelectorAll('#att-body .ot-inp').forEach(inp => {
    const v = otMap[inp.dataset.ot];
    if (inp !== document.activeElement) inp.value = v || '';
  });
}

function markAll(s) {
  if (!att[curDate]) att[curDate] = {};
  emps.forEach(e => att[curDate][e.id] = s);
  setDirty(true);
  syncStatusClasses();
  updateStats();
}

function onOTChange(e) {
  const inp = e.target.closest('.ot-inp');
  if (!inp) return;
  const id  = inp.dataset.ot;
  const val = parseFloat(inp.value) || 0;
  if (!att[curDate]) att[curDate] = {};
  if (!att[curDate].ot) att[curDate].ot = {};
  if (val > 0) att[curDate].ot[id] = val;
  else delete att[curDate].ot[id];
  setDirty(true);
  updateStats();
}

function updateStats() {
  const day  = att[curDate] || {};
  const vals = Object.entries(day).filter(([k]) => k !== 'ot').map(([,v]) => v);
  const otMap = day.ot || {};
  const totalOT = Object.values(otMap).reduce((s,v) => s + (parseFloat(v)||0), 0);
  document.getElementById('s-tot').textContent = emps.length;
  document.getElementById('s-prs').textContent = vals.filter(v => v==='P').length;
  document.getElementById('s-abs').textContent = vals.filter(v => v==='A').length;
  document.getElementById('s-hlf').textContent = vals.filter(v => v==='H').length;
  document.getElementById('s-ot').textContent  = totalOT % 1 === 0 ? totalOT : totalOT.toFixed(1);
}

function setDirty(v) {
  dirty = v;
  document.getElementById('sdot').classList.toggle('on', v);
}

function saveAtt() {
  if (!att[curDate]) att[curDate] = {};
  save();
  setDirty(false);
  showToast('✓ ' + fmt(curDate) + ' saved!');
}

// ════════════════════════════════════════════════
//  REPORTS
// ════════════════════════════════════════════════
function genReport() {
  const from = document.getElementById('r-from').value;
  const to   = document.getElementById('r-to').value;
  if (!from || !to) { showToast('⚠ Date range select karo!'); return; }

  const dates = datRange(from, to);
  const body  = document.getElementById('rep-body');

  if (!emps.length) {
    body.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--mut);padding:2rem">No employees</td></tr>';
    return;
  }

  body.innerHTML = emps.map(e => {
    let P=0, A=0, H=0, marked=0, OT=0;
    dates.forEach(d => {
      const v  = (att[d] || {})[e.id];
      const ot = (att[d]?.ot || {})[e.id];
      if (v) { marked++; if(v==='P')P++; else if(v==='A')A++; else H++; }
      if (ot) OT += parseFloat(ot)||0;
    });
    const eff = P + H*0.5;
    const pct = marked > 0 ? Math.round((eff/marked)*100) : 0;
    const col = pct>=75 ? 'var(--grn)' : pct>=50 ? 'var(--ylw)' : 'var(--red)';
    const otStr = OT % 1 === 0 ? OT : OT.toFixed(1);
    return `<tr>
      <td><strong>${esc(e.name)}</strong></td>
      <td style="color:var(--mut)">${esc(e.dept)}</td>
      <td style="font-family:'JetBrains Mono',monospace">${marked}/${dates.length}</td>
      <td><span class="badge bP">${P}</span></td>
      <td><span class="badge bA">${A}</span></td>
      <td><span class="badge bH">${H}</span></td>
      <td style="color:#f97316;font-weight:600;font-family:'JetBrains Mono',monospace">${otStr} hr</td>
      <td><div class="pbar">
        <div class="ptrack"><div class="pfill" style="width:${pct}%;background:${col}"></div></div>
        <span class="ptext" style="color:${col}">${pct}%</span>
      </div></td>
    </tr>`;
  }).join('');

  showToast('✓ Report ready!');
}

// ════════════════════════════════════════════════
//  EXPORT CSV
// ════════════════════════════════════════════════
function exportDay() {
  let csv = 'Name,Department,Role,Status,OT Hours,Date\n';
  emps.forEach(e => {
    const v   = (att[curDate] || {})[e.id] || '';
    const ot  = (att[curDate]?.ot || {})[e.id] || 0;
    const lbl = v==='P'?'Present':v==='A'?'Absent':v==='H'?'Half Day':'Not Marked';
    csv += `"${e.name}","${e.dept}","${e.role}","${lbl}",${ot},"${curDate}"\n`;
  });
  dlCSV(csv, 'attendance_' + curDate + '.csv');
  showToast('⬇ CSV downloaded!');
}

function exportReport() {
  const from = document.getElementById('r-from').value;
  const to   = document.getElementById('r-to').value;
  if (!from || !to) { showToast('⚠ Pehle report generate karo!'); return; }
  const dates = datRange(from, to);
  let csv = 'Name,Department,Role,Working Days,Present,Absent,Half Day,Total OT Hours,Attendance%\n';
  emps.forEach(e => {
    let P=0,A=0,H=0,m=0,OT=0;
    dates.forEach(d => {
      const v=(att[d]||{})[e.id];
      const ot=(att[d]?.ot||{})[e.id];
      if(v){m++;if(v==='P')P++;else if(v==='A')A++;else H++;}
      if(ot) OT+=parseFloat(ot)||0;
    });
    const pct = m>0?Math.round(((P+H*.5)/m)*100):0;
    csv += `"${e.name}","${e.dept}","${e.role}",${m},${P},${A},${H},${OT},${pct}%\n`;
  });
  dlCSV(csv, `report_${from}_to_${to}.csv`);
  showToast('⬇ Report CSV downloaded!');
}

function dlCSV(csv, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = name; a.click();
}

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
function save() {
  localStorage.setItem('wt2_emps', JSON.stringify(emps));
  localStorage.setItem('wt2_att',  JSON.stringify(att));
}

function today() { return new Date().toISOString().split('T')[0]; }
function p2(n)   { return String(n).padStart(2,'0'); }
function fmt(d)  {
  return new Date(d+'T00:00:00').toLocaleDateString('en-IN',
    {weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
function esc(s)  { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function datRange(from, to) {
  const out = []; let c = new Date(from+'T00:00:00'); const e = new Date(to+'T00:00:00');
  while(c<=e){ out.push(c.toISOString().split('T')[0]); c.setDate(c.getDate()+1); }
  return out;
}

let _t;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(_t); _t = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
